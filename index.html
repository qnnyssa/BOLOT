<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Caregiver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4A235A 0%, #1B0A26 50%, #000000 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .character-image {
            width: 100px;
            height: auto;
            animation: float 3s ease-in-out infinite;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .menu-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.8;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2rem;
            }
            .character-image {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Hi! Cargiver</h1>
        </header>
        <main class="menu-grid">
            <a href="#" class="menu-card">
                <span class="card-title">Jadwal</span>
                <span class="card-subtitle">Minum Obat</span>
            </a>
            <a href="#" class="menu-card">
                <span class="card-title">Kata</span>
                <span class="card-subtitle">Motivasi</span>
            </a>
            <a href="#" class="menu-card">
                <span class="card-title">Kata</span>
                <span class="card-subtitle">Hiburan</span>
            </a>
            <a href="#" class="menu-card">
                <span class="card-title">Pesan</span>
                <span class="card-subtitle">Tambahan</span>
            </a>
        </main>
    </div>

</body>
</html>
